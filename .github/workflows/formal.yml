name: formal

on:
  workflow_dispatch:
  push:
    paths:
      - 'formal/**'
      - 'sui/sources/**'
      - 'scripts/chaos_phase1.py'
      - 'scripts/deploy_sui.py'
      - 'scripts/scallop_core_bridge.py'
      - 'scripts/testnet_cycle_smoke.py'
      - 'scripts/monitor_sui.py'
      - 'scripts/formal_verify_wsl.sh'
      - 'scripts/install_sui_prover_wsl.sh'
      - '.github/workflows/formal.yml'
  pull_request:
    paths:
      - 'formal/**'
      - 'sui/sources/**'
      - 'scripts/chaos_phase1.py'
      - 'scripts/deploy_sui.py'
      - 'scripts/scallop_core_bridge.py'
      - 'scripts/testnet_cycle_smoke.py'
      - 'scripts/monitor_sui.py'
      - 'scripts/formal_verify_wsl.sh'
      - 'scripts/install_sui_prover_wsl.sh'
      - '.github/workflows/formal.yml'

jobs:
  move-tests:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      GITHUB_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize Move lock paths
        run: |
          python - <<'PY'
          from pathlib import Path
          for rel in ('sui/Move.lock', 'formal/Move.lock'):
              path = Path(rel)
              if path.exists():
                  text = path.read_text(encoding='utf-8')
                  normalized = text.replace('\\', '/')
                  if normalized != text:
                      path.write_text(normalized, encoding='utf-8')
          PY

      - name: Install `suiup`
        run: |
          set -euo pipefail
          curl -sSfL https://raw.githubusercontent.com/MystenLabs/suiup/main/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install Sui CLI and run Move tests
        run: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"
          suiup install sui@testnet-1.67.1 -y
          command -v sui
          sui --version
          cd sui
          sui move test

  formal:
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize Move lock paths
        run: |
          python - <<'PY'
          from pathlib import Path
          for rel in ('sui/Move.lock', 'formal/Move.lock'):
              path = Path(rel)
              if path.exists():
                  text = path.read_text(encoding='utf-8')
                  normalized = text.replace('\\', '/')
                  if normalized != text:
                      path.write_text(normalized, encoding='utf-8')
          PY

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.move
          key: formal-cargo-${{ runner.os }}-${{ hashFiles('scripts/install_sui_prover_wsl.sh', 'scripts/formal_verify_wsl.sh', 'formal/Move.toml') }}

      - name: Install formal toolchain
        run: bash scripts/install_sui_prover_wsl.sh

      - name: Run formal suite
        run: bash scripts/formal_verify_wsl.sh -v | tee formal.log

      - name: Upload formal log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: formal-log
          path: formal.log
          retention-days: 7

  chaos:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run chaos Phase 1 harness
        run: python scripts/chaos_phase1.py --report-out out/reports/chaos_phase1_ci.json

      - name: Upload chaos reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chaos-reports
          path: out/reports/chaos_phase1_ci.json
          retention-days: 7
